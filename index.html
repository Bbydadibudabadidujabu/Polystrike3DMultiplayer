<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PolyStrike 3D | Multiplayer Peer-to-Peer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; color: #0f0; }
        canvas { display: block; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        
        /* Menu Styles */
        .menu { pointer-events: auto; position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .menu h1 { margin-bottom: 20px; text-shadow: 0 0 10px #0f0; }
        
        #username-input, #join-input { 
            padding: 12px; 
            background: #111; 
            border: 2px solid #0f0; 
            color: #0f0; 
            font-family: inherit; 
            font-size: 1.2rem; 
            text-align: center; 
            outline: none;
            width: 300px;
            margin-bottom: 10px;
        }

        .menu-btn { 
            width: 320px; 
            padding: 12px; 
            background: #000; 
            color: #0f0; 
            border: 1px solid #0f0; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 1rem;
            transition: 0.2s;
        }
        .menu-btn:hover { background: #0f0; color: #000; }
        
        /* HUD & Screens */
        #hud { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        
        #win-screen { position: absolute; inset: 0; background: rgba(0, 100, 0, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; color: white; text-align: center; }
        #win-screen h1 { font-size: 5rem; margin-bottom: 10px; text-shadow: 0 0 20px #fff; }

        #death-screen { position: absolute; inset: 0; background: rgba(150, 0, 0, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 101; pointer-events: auto; color: white; text-align: center; }
        #death-screen h1 { font-size: 5rem; color: #ff0000; margin-bottom: 10px; }

        .win-btn { padding: 20px 50px; font-size: 1.5rem; background: #fff; color: #060; border: none; cursor: pointer; font-weight: bold; font-family: inherit; }
        .win-btn:hover { background: #0f0; color: #000; }

        #settings-panel { position: absolute; top: 20px; left: 20px; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #0f0; font-size: 12px; }
        .setting-item { margin-bottom: 8px; }
        #ability-panel { position: absolute; top: 120px; right: 20px; text-align: right; pointer-events: auto; }
        .ability-btn { display: block; background: #111; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; cursor: pointer; width: 220px; text-align: left; font-size: 12px; }
        .ability-btn:hover { background: #0f0; color: #000; }
        #active-timer { color: #ffff00; font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 5px #000; }

        #chat-container { position: absolute; bottom: 20px; left: 20px; pointer-events: auto; }
        #chat-box { width: 300px; height: 120px; background: rgba(0,0,0,0.6); border: 1px solid #333; overflow-y: auto; padding: 5px; font-size: 12px; margin-bottom: 5px; color: #fff; }
        #chat-input { width: 300px; background: #111; border: 1px solid #0f0; color: #0f0; padding: 8px; }

        #top-stats { align-self: center; text-align: center; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; min-width: 200px; }
        #weapon-info { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); text-align: center; }
        #inventory { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .slot { width: 45px; height: 30px; background: rgba(0,0,0,0.8); border: 1px solid #444; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .active { border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .hidden { display: none !important; }
        #network-status { position: fixed; top: 10px; right: 10px; font-size: 10px; color: #888; }
    </style>
</head>
<body>

<div id="ui">
    <div id="network-status">OFFLINE</div>
    <div id="win-screen">
        <h1>YOU WIN!</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">THE ULTIMATE BOSS HAS FALLEN</p>
        <button class="win-btn" onclick="location.reload()">CLOSE GAME</button>
    </div>

    <div id="death-screen">
        <h1>YOU DIED!</h1>
        <p style="font-size: 1.5rem; margin-bottom: 30px;">RESPAWNING...</p>
        <button class="win-btn" onclick="respawnPlayer()">CONTINUE</button>
    </div>

    <div id="main-menu" class="menu">
        <h1>POLYSTRIKE 3D</h1>
        <input type="text" id="username-input" placeholder="ENTER USERNAME..." maxlength="15">
        <button class="menu-btn" onclick="validateAndStart('Singleplayer')">SINGLEPLAYER</button>
        <button class="menu-btn" onclick="showMultiplayerMenu()">MULTIPLAYER</button>
    </div>

    <div id="multiplayer-menu" class="menu hidden">
        <h1>MULTIPLAYER</h1>
        <button class="menu-btn" onclick="hostServer()">HOST SERVER</button>
        <input type="text" id="join-input" placeholder="ENTER 5-LETTER CODE..." maxlength="5">
        <button class="menu-btn" onclick="joinServer()">JOIN SERVER</button>
        <button class="menu-btn" onclick="backToMain()" style="border-color: #f00; color: #f00;">BACK</button>
    </div>

    <div id="hud" class="hidden">
        <div id="settings-panel">
            <div class="setting-item">
                FOV: <input type="range" id="fov-slider" min="60" max="110" value="75" step="5">
            </div>
            <div class="setting-item">
                <button onclick="togglePerformance()">MAX FPS: <span id="fps-status">OFF</span></button>
            </div>
        </div>

        <div id="top-stats">
            LVL: <span id="lvl">1</span> | HP: <span id="hp">100</span> | ENEMIES: <span id="enm">0</span><br>
            <span id="active-timer"></span>
        </div>

        <div id="ability-panel">
            <div id="ability-title">ABILITIES (1 MIN COOLDOWN)</div>
            <div id="ability-list"></div>
        </div>

        <div id="chat-container">
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Press Enter to Chat...">
        </div>

        <div id="weapon-info"><div id="cur-weapon-name">LASER GUN</div></div>
        <div id="inventory"></div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, clock, player, gun;
    let move = { f: false, b: false, l: false, r: false }, isFiring = false;
    let vel = new THREE.Vector3(), enemies = [], walls = [], bullets = [], enemyBullets = [];
    let curLvl = 1, playerHP = 100, curSlot = 0, lastFire = 0;
    
    let canJump = true;
    const GRAVITY = 30.0;
    const JUMP_FORCE = 12.0;
    let yVel = 0;

    let activeAbility = null;
    let abilityTimer = 0;
    let abilityCooldown = false;
    let highPerf = false;
    let gameWon = false;
    let isDead = false;
    let myUsername = "Player";

    // --- Networking Variables ---
    let peer = null;
    let connections = [];
    let remotePlayers = {}; 
    let isHost = false;
    const MAX_PLAYERS = 5;

    const weapons = [
        { name: "LASER GUN", color: 0x00ffff, size: [0.1, 0.1, 0.4], rate: 200, dmg: 25 },
        { name: "LASER RIFLE", color: 0x00ff00, size: [0.12, 0.12, 0.7], rate: 150, dmg: 20 },
        { name: "REVOLVER", color: 0xaaaaaa, size: [0.08, 0.15, 0.3], rate: 400, dmg: 45 },
        { name: "MINIGUN", color: 0x444444, size: [0.2, 0.2, 0.6], rate: 50, dmg: 10 },
        { name: "SMG", color: 0x333333, size: [0.1, 0.15, 0.4], rate: 80, dmg: 12 },
        { name: "SNIPER", color: 0x00ff00, size: [0.05, 0.05, 1.2], rate: 1000, dmg: 100 }, 
        { name: "BAZOOKA", color: 0x005500, size: [0.25, 0.25, 0.8], rate: 1200, dmg: 150 },
        { name: "GRENADE", color: 0x555500, size: [0.15, 0.15, 0.15], rate: 800, dmg: 80 },
        { name: "MEDKIT", color: 0xff0000, size: [0.2, 0.2, 0.1], rate: 1000, dmg: 0 },
        { name: "SHIELD", color: 0x0000ff, size: [0.8, 0.8, 0.05], rate: 100, dmg: 0 }
    ];

    const abilityPool = [
        { id: "speed", name: "2x Speed (1 min)", duration: 60 },
        { id: "god", name: "Invincibility (1 min)", duration: 60 },
        { id: "oneshot", name: "ONE SHOT (10 SEC)", duration: 10 },
        { id: "freeze", name: "Freeze Bullets (1 min)", duration: 60 }
    ];

    window.showMultiplayerMenu = () => {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('multiplayer-menu').classList.remove('hidden');
    };

    window.backToMain = () => {
        document.getElementById('multiplayer-menu').classList.add('hidden');
        document.getElementById('main-menu').classList.remove('hidden');
    };

    // --- PeerJS Logic ---
    window.hostServer = () => {
        const user = document.getElementById('username-input').value.trim();
        if (user === "") { alert("Enter username first!"); return; }
        myUsername = user;
        isHost = true;

        const code = Math.random().toString(36).substring(2, 7);
        peer = new Peer(`polystrike-${code}`);

        peer.on('open', (id) => {
            document.getElementById('network-status').innerText = `HOSTING: ${code.toUpperCase()}`;
            validateAndStart(`HOST: ${code.toUpperCase()}`);
        });

        peer.on('connection', (conn) => {
            if (connections.length >= MAX_PLAYERS - 1) {
                conn.on('open', () => {
                    conn.send({ type: 'error', msg: 'Lobby Full' });
                    setTimeout(() => conn.close(), 500);
                });
                return;
            }
            setupConnection(conn);
        });
    };

    window.joinServer = () => {
        const user = document.getElementById('username-input').value.trim();
        const code = document.getElementById('join-input').value.trim().toLowerCase();
        if (user === "" || code.length < 5) { alert("Enter username and code!"); return; }
        myUsername = user;
        isHost = false;

        peer = new Peer();
        peer.on('open', (id) => {
            const conn = peer.connect(`polystrike-${code}`);
            setupConnection(conn);
            document.getElementById('network-status').innerText = `JOINING: ${code.toUpperCase()}`;
            validateAndStart(`JOINED: ${code.toUpperCase()}`);
        });
    };

    function setupConnection(conn) {
        conn.on('open', () => {
            connections.push(conn);
            conn.send({ type: 'handshake', username: myUsername });
        });

        conn.on('data', (data) => handlePeerData(data, conn));
        
        conn.on('close', () => {
            if (remotePlayers[conn.peer]) {
                scene.remove(remotePlayers[conn.peer].mesh);
                delete remotePlayers[conn.peer];
            }
            connections = connections.filter(c => c !== conn);
        });
    }

    function handlePeerData(data, conn) {
        if (data.type === 'error') { alert(data.msg); location.reload(); }

        if (data.type === 'handshake') {
            createRemotePlayer(conn.peer, data.username);
        }

        if (data.type === 'move') {
            if (remotePlayers[conn.peer]) {
                remotePlayers[conn.peer].mesh.position.set(data.x, data.y, data.z);
                remotePlayers[conn.peer].mesh.rotation.y = data.ry;
            }
        }

        if (data.type === 'shoot') {
            spawnBullet(new THREE.Vector3(data.pos.x, data.pos.y, data.pos.z), data.dir, data.dmg, false);
        }

        if (data.type === 'chat') {
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div><b>${data.user}:</b> ${data.msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // CLIENT-SIDE: Handle enemy updates from host
        if (data.type === 'enemySync' && !isHost) {
            updateEnemiesFromHost(data.enemies);
        }

        // HOST-SIDE: Handle hit notification from clients
        if (data.type === 'enemyHit' && isHost) {
            const en = enemies.find(e => e.id === data.id);
            if (en) en.hp -= data.dmg;
        }
    }

    function createRemotePlayer(id, name) {
        const geo = new THREE.CylinderGeometry(0.5, 0.5, 2);
        const mat = new THREE.MeshStandardMaterial({ color: 0x0088ff });
        const mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);
        remotePlayers[id] = { mesh, username: name };
        
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div style="color:#0af">SERVER: ${name} connected.</div>`;
    }

    function broadcast(data) {
        connections.forEach(c => c.send(data));
    }

    // --- Enemy Logic Update ---
    function updateEnemiesFromHost(enemyData) {
        // Remove enemies that are no longer in the list
        const activeIds = enemyData.map(e => e.id);
        enemies = enemies.filter(en => {
            if (!activeIds.includes(en.id)) {
                scene.remove(en.mesh);
                scene.remove(en.hpBar);
                return false;
            }
            return true;
        });

        enemyData.forEach(data => {
            let en = enemies.find(e => e.id === data.id);
            if (!en) {
                // Spawn new enemy mesh locally
                const scale = data.isBoss ? 2.5 : 1;
                const m = new THREE.Mesh(new THREE.CylinderGeometry(0.5*scale, 0.5*scale, 2*scale), new THREE.MeshStandardMaterial({color: data.isBoss?0xff0000:0xff7700}));
                const hpBar = new THREE.Mesh(new THREE.PlaneGeometry(1.5*scale, 0.2), new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide}));
                scene.add(m); scene.add(hpBar);
                en = { id: data.id, mesh: m, hpBar, scale, isBoss: data.isBoss, hp: data.hp, maxHP: data.maxHP };
                enemies.push(en);
            }
            // Update position and HP
            en.mesh.position.set(data.x, data.y, data.z);
            en.hp = data.hp;
            en.hpBar.position.set(data.x, 2.5 * en.scale + 0.5, data.z);
            en.hpBar.scale.x = Math.max(0.01, en.hp / en.maxHP);
            en.hpBar.lookAt(camera.position);
        });
        document.getElementById('enm').innerText = enemies.length;
    }

    window.validateAndStart = (mode) => {
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('multiplayer-menu').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        init();
        if (isHost || !peer) spawnLevel(curLvl);
        refreshAbilities();
        const box = document.getElementById('chat-box');
        box.innerHTML += `<div style="color: #ffff00">SYSTEM: Starting as ${myUsername}</div>`;
    };

    function handleDeath() {
        isDead = true;
        isFiring = false;
        document.exitPointerLock();
        document.getElementById('death-screen').style.display = 'flex';
    }

    window.respawnPlayer = () => {
        playerHP = 100;
        isDead = false;
        player.position.set(0, 1.6, 0);
        document.getElementById('death-screen').style.display = 'none';
        document.body.requestPointerLock();
    };

    window.togglePerformance = () => {
        highPerf = !highPerf;
        document.getElementById('fps-status').innerText = highPerf ? "ON" : "OFF";
        renderer.setPixelRatio(highPerf ? 0.5 : window.devicePixelRatio);
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        clock = new THREE.Clock();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        player = new THREE.Group();
        player.position.set(0, 1.6, 0);
        scene.add(player);
        player.add(camera);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        
        createWorld();
        createInventoryUI();
        setupControls();
        animate();

        document.getElementById('fov-slider').addEventListener('input', (e) => {
            camera.fov = parseInt(e.target.value);
            camera.updateProjectionMatrix();
        });
    }

    function createWorld() {
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);
        const makeWall = (w,h,d,x,z) => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color: 0x222222}));
            m.position.set(x, h/2, z);
            scene.add(m);
            walls.push(new THREE.Box3().setFromObject(m));
        };
        makeWall(100, 10, 2, 0, 50); makeWall(100, 10, 2, 0, -50);
        makeWall(2, 10, 100, 50, 0); makeWall(2, 10, 100, -50, 0);
    }

    function spawnLevel(n) {
        enemies.forEach(e => { scene.remove(e.mesh); scene.remove(e.hpBar); });
        enemies = [];
        const isBoss = (n === 10);
        const count = isBoss ? 1 : n * 2;
        document.getElementById('enm').innerText = count;
        document.getElementById('lvl').innerText = n;
        for(let i=0; i<count; i++){
            const scale = isBoss ? 2.5 : 1;
            const m = new THREE.Mesh(new THREE.CylinderGeometry(0.5*scale, 0.5*scale, 2*scale), new THREE.MeshStandardMaterial({color: isBoss?0xff0000:0xff7700}));
            m.position.set((Math.random()-0.5)*70, 1*scale, (Math.random()-0.5)*70);
            const hpBar = new THREE.Mesh(new THREE.PlaneGeometry(1.5*scale, 0.2), new THREE.MeshBasicMaterial({color: 0x00ff00, side: THREE.DoubleSide}));
            scene.add(m); scene.add(hpBar);
            enemies.push({id: Math.random().toString(36).substr(2, 9), mesh: m, hpBar, hp: isBoss?1000:100, maxHP: isBoss?1000:100, lastShot: 0, scale, isBoss});
        }
    }

    function refreshAbilities() {
        if(abilityCooldown) return;
        const list = document.getElementById('ability-list');
        list.innerHTML = "";
        const shuffled = [...abilityPool].sort(() => 0.5 - Math.random());
        shuffled.slice(0, 3).forEach(ab => {
            const btn = document.createElement('button');
            btn.className = 'ability-btn';
            btn.innerText = ab.name;
            btn.onclick = () => activateAbility(ab);
            list.appendChild(btn);
        });
    }

    function activateAbility(ab) {
        activeAbility = ab.id;
        abilityTimer = ab.duration;
        abilityCooldown = true;
        document.getElementById('ability-list').innerHTML = "ON COOLDOWN...";
        
        setTimeout(() => {
            activeAbility = null;
            document.getElementById('active-timer').innerText = "";
            setTimeout(() => {
                abilityCooldown = false;
                refreshAbilities();
            }, 60000); 
        }, ab.duration * 1000);
    }

    function setupControls() {
        document.addEventListener('keydown', e => {
            if(gameWon || isDead) return;
            if(e.code === 'KeyW') move.f = true; if(e.code === 'KeyS') move.b = true;
            if(e.code === 'KeyA') move.l = true; if(e.code === 'KeyD') move.r = true;
            if(e.code === 'Space' && canJump) { yVel = JUMP_FORCE; canJump = false; }
            if(e.code.startsWith('Digit')) selectSlot((parseInt(e.code.slice(-1)) + 9) % 10);
            if(e.code === 'Enter') handleChat();
        });
        document.addEventListener('keyup', e => {
            if(e.code === 'KeyW') move.f = false; if(e.code === 'KeyS') move.b = false;
            if(e.code === 'KeyA') move.l = false; if(e.code === 'KeyD') move.r = false;
        });
        document.addEventListener('mousedown', () => { 
            if(gameWon || isDead) return;
            isFiring = true; 
            document.body.requestPointerLock(); 
        });
        document.addEventListener('mouseup', () => { isFiring = false; });
        document.addEventListener('mousemove', e => {
            if(document.pointerLockElement && !gameWon && !isDead){
                player.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });
    }

    function handleChat() {
        const input = document.getElementById('chat-input');
        if(document.activeElement !== input) { input.focus(); } 
        else {
            if(input.value.trim() !== "") {
                const box = document.getElementById('chat-box');
                box.innerHTML += `<div><b>${myUsername}:</b> ${input.value}</div>`;
                box.scrollTop = box.scrollHeight;
                broadcast({ type: 'chat', user: myUsername, msg: input.value });
            }
            input.value = ""; input.blur(); document.body.requestPointerLock();
        }
    }

    function spawnBullet(pos, dir, dmg, isLocal) {
        const bMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
        bMesh.position.copy(pos);
        const bDir = new THREE.Vector3(dir.x, dir.y, dir.z);
        bullets.push({ mesh: bMesh, dir: bDir, dmg, time: Date.now(), isLocal });
        scene.add(bMesh);
        
        if (isLocal) {
            broadcast({ type: 'shoot', pos, dir, dmg });
        }
    }

    function selectSlot(i) {
        curSlot = i;
        document.querySelectorAll('.slot').forEach((s, idx) => s.classList.toggle('active', idx === i));
        document.getElementById('cur-weapon-name').innerText = weapons[i].name;
        gun.scale.set(...weapons[i].size);
        gun.material.color.setHex(weapons[i].color);
        gun.position.set(weapons[i].name === "SHIELD" ? 0 : 0.3, -0.3, -0.6);
    }

    function createInventoryUI() {
        const inv = document.getElementById('inventory');
        weapons.forEach((w, i) => {
            const s = document.createElement('div');
            s.className = 'slot' + (i === 0 ? ' active' : '');
            s.innerText = (i+1)%10;
            inv.appendChild(s);
        });
        gun = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial());
        camera.add(gun);
        selectSlot(0);
    }

    function showWinScreen() {
        gameWon = true;
        isFiring = false;
        document.exitPointerLock();
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('hud').classList.add('hidden');
    }

    let lastNetTick = 0;
    function animate() {
        requestAnimationFrame(animate);
        if(gameWon || isDead) return;
        const dt = clock.getDelta();

        if(activeAbility) {
            abilityTimer -= dt;
            document.getElementById('active-timer').innerText = `ACTIVE: ${activeAbility.toUpperCase()} (${Math.max(0, Math.ceil(abilityTimer))}s)`;
        }

        let oldPos = player.position.clone();
        vel.x -= vel.x * 10 * dt; vel.z -= vel.z * 10 * dt;
        let d = new THREE.Vector3(Number(move.r)-Number(move.l), 0, Number(move.b)-Number(move.f)).normalize();
        let speedMult = activeAbility === "speed" ? 240 : 120;
        if(move.f || move.b || move.l || move.r) vel.add(d.applyQuaternion(player.quaternion).multiplyScalar(speedMult * dt));
        player.position.addScaledVector(vel, dt);

        yVel -= GRAVITY * dt;
        player.position.y += yVel * dt;
        if(player.position.y < 1.6) { player.position.y = 1.6; yVel = 0; canJump = true; }

        const pBox = new THREE.Box3().setFromCenterAndSize(player.position, new THREE.Vector3(1,2,1));
        for(let w of walls) if(pBox.intersectsBox(w)) { player.position.x = oldPos.x; player.position.z = oldPos.z; }

        // Networking: Sync Position & Enemies every 50ms
        if(Date.now() - lastNetTick > 50 && peer) {
            broadcast({ type: 'move', x: player.position.x, y: player.position.y, z: player.position.z, ry: player.rotation.y });
            
            if (isHost) {
                const enemyData = enemies.map(en => ({
                    id: en.id, x: en.mesh.position.x, y: en.mesh.position.y, z: en.mesh.position.z,
                    hp: en.hp, maxHP: en.maxHP, isBoss: en.isBoss
                }));
                broadcast({ type: 'enemySync', enemies: enemyData });
            }
            lastNetTick = Date.now();
        }

        const curWep = weapons[curSlot];
        if(isFiring && Date.now() - lastFire > curWep.rate) {
            lastFire = Date.now();
            if(curWep.name === "MEDKIT") { playerHP = 100; } 
            else if(curWep.dmg > 0) {
                const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
                spawnBullet(player.position.clone(), dir, activeAbility === "oneshot" ? 99999 : curWep.dmg, true);
            }
        }
        
        if(curWep.name === "SHIELD") playerHP = Math.min(100, playerHP + 5 * dt);
        document.getElementById('hp').innerText = Math.floor(playerHP);

        // Update Bullets
        for(let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.mesh.position.addScaledVector(b.dir, 70 * dt);
            
            enemies.forEach(en => {
                if(b.mesh.position.distanceTo(en.mesh.position) < (1.2 * en.scale)) {
                    if (b.isLocal) {
                        if (isHost) en.hp -= b.dmg;
                        else broadcast({ type: 'enemyHit', id: en.id, dmg: b.dmg });
                    }
                    scene.remove(b.mesh); bullets.splice(i, 1);
                }
            });
            if(b && b.time < Date.now() - 2000) { scene.remove(b.mesh); bullets.splice(i, 1); }
        }

        let bulletFreeze = activeAbility === "freeze" ? 0.1 : 1;
        for(let i = enemyBullets.length - 1; i >= 0; i--) {
            const eb = enemyBullets[i];
            eb.mesh.position.addScaledVector(eb.dir, 35 * bulletFreeze * dt);
            if(eb.mesh.position.distanceTo(player.position) < 1.2) {
                if(activeAbility !== "god") playerHP -= 10;
                scene.remove(eb.mesh); enemyBullets.splice(i, 1);
                if(playerHP <= 0) handleDeath();
            }
            if(eb && Date.now() - eb.time > 3000) { scene.remove(eb.mesh); enemyBullets.splice(i, 1); }
        }

        // Host handles Enemy AI
        if (isHost || !peer) {
            enemies.forEach((en, idx) => {
                // Find nearest player (Self or Remotes)
                let targetPos = player.position;
                let minDist = en.mesh.position.distanceTo(player.position);
                
                Object.values(remotePlayers).forEach(p => {
                    let d = en.mesh.position.distanceTo(p.mesh.position);
                    if (d < minDist) { minDist = d; targetPos = p.mesh.position; }
                });

                const moveDir = new THREE.Vector3().subVectors(targetPos, en.mesh.position).normalize();
                en.mesh.position.addScaledVector(moveDir, 4 * dt);
                
                en.hpBar.position.set(en.mesh.position.x, 2.5 * en.scale + 0.5, en.mesh.position.z);
                en.hpBar.scale.x = Math.max(0.01, en.hp / en.maxHP);
                en.hpBar.lookAt(camera.position);

                if(minDist < 20 && Date.now() - en.lastShot > 2500) {
                    const ebMesh = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    ebMesh.position.copy(en.mesh.position);
                    enemyBullets.push({mesh: ebMesh, dir: moveDir.clone(), time: Date.now()});
                    scene.add(ebMesh);
                    en.lastShot = Date.now();
                }

                if(en.hp <= 0) {
                    scene.remove(en.mesh); scene.remove(en.hpBar);
                    const wasBoss = en.isBoss;
                    enemies.splice(idx, 1);
                    document.getElementById('enm').innerText = enemies.length;
                    if(wasBoss) showWinScreen();
                    else if(enemies.length === 0 && curLvl < 10) spawnLevel(++curLvl);
                }
            });
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
